classes:
    # Root container
    MetrologicalTraceability:
        class_uri: mt:metrologicalTraceability
        description: "Root container for metrological traceability statements and supporting records"
        tree_root: true
        slots:
            - traceability_statements
            - traceability_chains
            - traceability_bases
            - reference_entities
            - calibration_records
            - measurement_procedures
            - boundary_definitions
            - reference_materials
            - measurement_standards
            - competence_records
            - comparability_assessments
            - traceability_evidence_references
        annotations:
            sql_identifier: "mt_root"

    # Main integration point
    TraceabilityStatement:
        class_uri: mt:traceabilityStatement
        description: "Reusable statement documenting the traceability basis of a measured, calculated, method-defined, or boundary-defined value"
        comments:
            - "Designed as the main integration point for other CE-RISE data models."
            - "Other models may either embed this class or point to it through traceability_statement_identifier_value."
        slots:
            - traceability_statement_identifier_value
            - traceability_statement_label_value
            - traceability_statement_type_value
            - traceability_status_value
            - traceability_statement_date_value
            - traceability_applies_to_model_value
            - traceability_applies_to_class_value
            - traceability_applies_to_slot_value
            - traceability_applies_to_record_value
            - traceability_applies_to_value_path_value
            - traceability_applies_to_value_identifier_value
            - traceability_measurand_identifier_value
            - traceability_measurand_name_value
            - traceability_measurand_description_value
            - traceability_quantity_kind_value
            - traceability_quantity_unit_value
            - reported_value_identifier_value
            - reported_value_value
            - reported_value_unit_value
            - result_date_value
            - traceability_basis
            - traceability_chain
            - measurement_procedure
            - boundary_definition
            - calibration_records
            - reference_entities
            - reference_materials
            - measurement_standards
            - competence_records
            - traceability_uncertainty_reference_value
            - traceability_data_quality_reference_value
            - traceability_evidence_reference_value
            - traceability_standards_applied_value
            - traceability_statement_notes_value
        annotations:
            references: "JCGM 200:2012; ISO/IEC 17025; ILAC P10; ISO 17034; ISO Guide 35; ISO 14040; ISO 14044"
            sql_identifier: "mt_statement"

    TraceabilityBasis:
        class_uri: mt:traceabilityBasis
        description: "Reference basis to which a result is related, such as an SI realization, measurement standard, reference material, standard method, or boundary definition"
        slots:
            - traceability_basis_identifier_value
            - traceability_basis_type_value
            - traceability_basis_description_value
            - common_reference_identifier_value
            - common_reference_name_value
            - common_reference_uri_value
            - reference_authority_value
            - reference_version_value
            - reference_used_date_value
            - reference_scope_value
            - traceability_uncertainty_reference_value
            - traceability_evidence_reference_value
        annotations:
            references: "JCGM 200:2012; ISO/IEC 17025; ILAC P10"
            sql_identifier: "mt_basis"

    ReferenceEntity:
        class_uri: mt:referenceEntity
        description: "Generic reference entity used in a traceability statement, chain, procedure, calibration, or boundary definition"
        slots:
            - reference_entity_identifier_value
            - reference_entity_name_value
            - reference_entity_type_value
            - reference_entity_uri_value
            - reference_entity_provider_value
            - assigned_value_value
            - assigned_value_unit_value
            - assigned_value_uncertainty_value
            - reference_valid_from_value
            - reference_valid_until_value
            - traceability_evidence_reference_value
        annotations:
            references: "JCGM 200:2012"
            sql_identifier: "mt_reference_entity"

    TraceabilityChain:
        class_uri: mt:traceabilityChain
        description: "Documented chain or network relating a measurement result to a reference"
        slots:
            - traceability_chain_identifier_value
            - traceability_chain_name_value
            - traceability_chain_type_value
            - chain_start_reference_value
            - chain_end_reference_value
            - chain_completeness_value
            - chain_validation_status_value
            - traceability_links
            - traceability_uncertainty_reference_value
            - traceability_evidence_reference_value
            - chain_notes_value
        annotations:
            references: "JCGM 200:2012; ISO/IEC 17025; ILAC P10"
            sql_identifier: "mt_chain"

    TraceabilityLink:
        class_uri: mt:traceabilityLink
        description: "Single documented step in a traceability chain, including calibration, comparison, transfer, method adherence, or boundary reference"
        slots:
            - traceability_link_identifier_value
            - link_sequence_value
            - link_role_value
            - link_from_reference_value
            - link_to_reference_value
            - link_procedure_value
            - link_uncertainty_reference_value
            - link_date_value
            - calibration_records
            - traceability_evidence_reference_value
            - traceability_statement_notes_value
        annotations:
            references: "JCGM 200:2012; ISO/IEC 17025"
            sql_identifier: "mt_link"

    CalibrationRecord:
        class_uri: mt:calibrationRecord
        description: "Calibration, comparison, verification, or check record contributing to a traceability chain"
        slots:
            - calibration_identifier_value
            - calibration_certificate_identifier_value
            - calibration_certificate_url_value
            - calibration_laboratory_value
            - calibration_laboratory_accreditation_value
            - calibrated_item_identifier_value
            - calibrated_item_type_value
            - calibration_method_value
            - calibration_date_value
            - calibration_due_date_value
            - calibration_interval_value
            - calibration_result_value
            - calibration_status_value
            - traceability_uncertainty_reference_value
            - traceability_environmental_conditions_value
            - traceability_evidence_reference_value
        annotations:
            references: "ISO/IEC 17025; ILAC P10; JCGM 200:2012"
            sql_identifier: "mt_calibration"

    MeasurementProcedure:
        class_uri: mt:measurementProcedure
        description: "Measurement, calculation, sampling, calibration, analytical, or modelling procedure used to define or transfer a value"
        slots:
            - procedure_identifier_value
            - procedure_name_value
            - procedure_role_value
            - procedure_standard_value
            - procedure_version_value
            - procedure_uri_value
            - procedure_description_value
            - method_parameters_value
            - sampling_or_specimen_definition_value
            - traceability_environmental_conditions_value
            - operator_or_software_value
            - traceability_uncertainty_reference_value
            - traceability_evidence_reference_value
        annotations:
            references: "JCGM 200:2012; ISO/IEC 17025; ISO 5725"
            sql_identifier: "mt_procedure"

    BoundaryDefinition:
        class_uri: mt:boundaryDefinition
        description: "Goal-and-scope, system boundary, scenario, allocation, or model definition used as the reference for a boundary-defined result"
        slots:
            - boundary_identifier_value
            - boundary_type_value
            - boundary_name_value
            - goal_scope_definition_value
            - included_processes_value
            - excluded_processes_value
            - allocation_rule_value
            - impact_method_value
            - characterization_model_value
            - data_source_scope_value
            - procedure_standard_value
            - procedure_version_value
            - traceability_uncertainty_reference_value
            - traceability_data_quality_reference_value
            - traceability_evidence_reference_value
        annotations:
            references: "ISO 14040; ISO 14044; ISO 14067; Product Environmental Footprint; JCGM 200:2012"
            sql_identifier: "mt_boundary_definition_record"

    ReferenceMaterial:
        class_uri: mt:referenceMaterial
        description: "Reference material or certified reference material used to establish traceability"
        slots:
            - reference_material_identifier_value
            - reference_material_name_value
            - reference_material_type_value
            - reference_material_producer_value
            - reference_material_lot_value
            - matrix_or_material_value
            - certified_property_value
            - assigned_value_value
            - assigned_value_unit_value
            - assigned_value_uncertainty_value
            - certificate_identifier_value
            - certificate_url_value
            - reference_valid_from_value
            - reference_valid_until_value
            - traceability_evidence_reference_value
        annotations:
            references: "ISO 17034; ISO Guide 35; JCGM 200:2012"
            sql_identifier: "mt_reference_material"

    MeasurementStandard:
        class_uri: mt:measurementStandard
        description: "Measurement standard, artefact, instrument standard, or unit realization used in a calibration hierarchy"
        slots:
            - measurement_standard_identifier_value
            - measurement_standard_name_value
            - measurement_standard_type_value
            - measurement_standard_owner_value
            - measurement_standard_level_value
            - traceability_quantity_kind_value
            - traceability_quantity_unit_value
            - assigned_value_value
            - assigned_value_unit_value
            - assigned_value_uncertainty_value
            - calibration_records
            - reference_valid_from_value
            - reference_valid_until_value
            - traceability_evidence_reference_value
        annotations:
            references: "JCGM 200:2012; ISO/IEC 17025; ILAC P10"
            sql_identifier: "mt_measurement_standard"

    CompetenceRecord:
        class_uri: mt:competenceRecord
        description: "Competence, accreditation, validation, proficiency, or quality system evidence supporting traceability"
        slots:
            - competence_record_identifier_value
            - competence_provider_value
            - competence_basis_value
            - accreditation_identifier_value
            - accreditation_body_value
            - competence_scope_value
            - competence_status_value
            - reference_valid_from_value
            - reference_valid_until_value
            - traceability_evidence_reference_value
        annotations:
            references: "ISO/IEC 17025; ISO 17034; ISO 9001; ILAC P10"
            sql_identifier: "mt_competence_record"

    ComparabilityAssessment:
        class_uri: mt:comparabilityAssessment
        description: "Assessment of whether two reported values are metrologically comparable through the same reference basis, measurand definition, method, or boundary"
        slots:
            - comparability_assessment_identifier_value
            - left_traceability_reference_value
            - right_traceability_reference_value
            - same_reference_basis_value
            - same_measurand_definition_value
            - same_method_or_boundary_value
            - comparability_decision_value
            - traceability_uncertainty_reference_value
            - comparability_rationale_value
        annotations:
            references: "JCGM 200:2012; JCGM 106:2012"
            sql_identifier: "mt_comparability_assessment"

    TraceabilityEvidenceReference:
        class_uri: mt:evidenceReference
        description: "Supporting evidence record for a traceability statement, chain, calibration, method, boundary, reference material, or competence record"
        slots:
            - traceability_evidence_identifier_value
            - traceability_evidence_type_value
            - traceability_evidence_url_value
            - traceability_evidence_description_value
            - traceability_evidence_date_value
            - traceability_evidence_provider_value
            - traceability_evidence_version_value
        annotations:
            sql_identifier: "mt_evidence_reference"

enums:
    TraceabilityStatementTypeEnum:
        description: "Kinds of traceability statements supported by this model"
        permissible_values:
            si_traceability:
                description: "Traceability to SI units through a calibration hierarchy"
            method_defined_traceability:
                description: "Traceability to a standardized or documented method that defines the property"
            boundary_defined_traceability:
                description: "Traceability to a documented system boundary, goal and scope, scenario, or modelling rule set"
            reference_material_traceability:
                description: "Traceability through a reference material or certified reference material"
            conventional_reference_traceability:
                description: "Traceability to a conventional value, conventional scale, or agreed reference"
            hybrid_traceability:
                description: "Traceability requiring more than one traceability type"
            not_evaluated:
                description: "Traceability has not been evaluated"
            other:
                description: "Other traceability statement type"

    TraceabilityStatusEnum:
        description: "Lifecycle and validation status values for traceability records"
        permissible_values:
            draft:
                description: "Record is being prepared"
            active:
                description: "Record is currently active or valid"
            reviewed:
                description: "Record has been reviewed"
            verified:
                description: "Record has been verified against supporting evidence"
            partial:
                description: "Record is partially documented or partially verified"
            expired:
                description: "Record is no longer valid"
            superseded:
                description: "Record has been superseded"
            unavailable:
                description: "Record or status information is unavailable"

    TraceabilityBasisTypeEnum:
        description: "Types of references that can serve as the basis for traceability"
        permissible_values:
            si_unit_realization:
                description: "Definition or practical realization of an SI unit"
            measurement_standard:
                description: "Measurement standard used in a calibration hierarchy"
            certified_reference_material:
                description: "Certified reference material with assigned property values and uncertainties"
            reference_material:
                description: "Reference material used for calibration, validation, or quality control"
            measurement_procedure:
                description: "Measurement procedure defining or transferring the value"
            standard_method:
                description: "Standardized analytical, test, calculation, or reporting method"
            system_boundary:
                description: "System boundary, goal-and-scope, or scenario definition"
            characterization_model:
                description: "Model or factor set defining a calculated indicator"
            data_source_or_dataset:
                description: "Versioned data source, dataset, or database used as a reference"
            conventional_reference:
                description: "Conventional reference, convention, or agreed value"
            other:
                description: "Other traceability basis type"

    ReferenceEntityTypeEnum:
        description: "Types of reference entities used in traceability records"
        permissible_values:
            si_definition:
                description: "SI unit definition or realization"
            national_standard:
                description: "National measurement standard"
            international_standard:
                description: "International measurement standard"
            working_standard:
                description: "Working standard or laboratory standard"
            instrument:
                description: "Instrument, sensor, measuring system, or equipment"
            reference_material:
                description: "Reference material or certified reference material"
            calibration_certificate:
                description: "Calibration certificate or report"
            method_document:
                description: "Measurement, analytical, test, calculation, or modelling method document"
            dataset:
                description: "Dataset, database, emission factor set, or reference data source"
            software:
                description: "Software, model implementation, or calculation service"
            boundary_document:
                description: "Goal-and-scope, system boundary, or scenario definition"
            organization:
                description: "Organization, laboratory, institute, or authority"
            other:
                description: "Other reference entity type"

    TraceabilityChainTypeEnum:
        description: "Topology or kind of traceability chain"
        permissible_values:
            linear_calibration_chain:
                description: "Single unbroken calibration chain"
            branched_calibration_network:
                description: "Branched or networked hierarchy for multiple input quantities"
            method_traceability_chain:
                description: "Chain linking the result to a method-defined reference"
            boundary_traceability_chain:
                description: "Chain linking the result to a boundary-defined or model-defined reference"
            hybrid_chain:
                description: "Chain combining calibration, method, boundary, and/or dataset references"
            not_documented:
                description: "Traceability chain is not documented"

    ChainCompletenessEnum:
        description: "Completeness of a traceability chain"
        permissible_values:
            complete:
                description: "All relevant links are documented"
            partial:
                description: "Some relevant links are documented"
            inferred:
                description: "Some links are inferred from available evidence"
            gap_identified:
                description: "One or more gaps are explicitly identified"
            unavailable:
                description: "Chain evidence is unavailable"

    TraceabilityLinkRoleEnum:
        description: "Roles of links in a traceability chain"
        permissible_values:
            calibration:
                description: "Calibration step"
            comparison:
                description: "Comparison between standards, methods, instruments, or values"
            verification:
                description: "Verification or intermediate check"
            correction:
                description: "Correction or adjustment step"
            value_transfer:
                description: "Transfer of a value from one reference to another"
            method_definition:
                description: "Method or procedure defining the property"
            boundary_definition:
                description: "Boundary, goal-and-scope, or modelling definition"
            data_source_mapping:
                description: "Mapping to a dataset, factor set, or data source"
            software_or_model_execution:
                description: "Software, model, or calculation execution step"
            other:
                description: "Other link role"

    CalibrationStatusEnum:
        description: "Status of a calibration or equivalent record"
        permissible_values:
            valid:
                description: "Calibration is valid for the intended use"
            valid_with_restrictions:
                description: "Calibration is valid only within specified restrictions"
            due:
                description: "Recalibration is due"
            expired:
                description: "Calibration validity has expired"
            failed:
